0x82CF7C80 = { name = "battle_hud_player_panel_state", size = 0x4EC8 } # 2 * 0x2764-byte player panels

# Battle-start phase latch. The tiny callbacks at 0x822A4B18/0x822A4B28/
# 0x822A4B38 store 1/2/3 here, and sciv_battle_match_start_sequence_update
# consumes it to pick the next startup sub-sequence.
0x829FC8C0 = "battle_match_start_phase_request"

# Engine type registry state. The registry array is BSS/runtime-built; the
# descriptor table is file-backed and assigned at sciv_engine_bootstrap
# 0x82138730..0x8213873c together with count=14.
0x830F5198 = { name = "type_registry_entries", size = 0x1C0 } # 14 entries * 0x20 bytes
0x82B56F24 = "type_registry_count"
0x82B56F20 = "type_registry_descriptor_table_ptr"
0x82868CD0 = "type_registry_descriptor_table"
0x830F4200 = "current_registry_manager"
0x830F4210 = "registry_stream_ptr"

# Bootstrap drain-loop state: sciv_engine_bootstrap pumps sciv_engine_main_tick
# while [game_data_wait_task_ptr] is non-null and its +0x30 field matches
# [game_data_wait_target_ptr].
0x82C37C10 = "game_data_wait_target_ptr"
0x82C37C14 = "game_data_wait_task_ptr"

# Boot intro modal object used by the SkipLogos clock-acceleration hook.
0x82891D50 = "boot_intro_modal_state"

# --- Runtime crash fix: null-source filter read (see src/sciv_hooks.cpp) ---
# obj_update_optional_source (0x821B1368) is called at 0x822E0B34 with r4 = 0 (no
# source). On the r24 == 0 path, when the object's two control floats are equal,
# control reaches 0x821B2204 `lhzx r10,r24,r10` (r10 = 0x1ED6A, r24 = 0), reading
# guest 0x1ED6A -- benign on console, unmapped in the recomp -> intermittent AV
# (logs/sciv_033.log). The hook fires only when r24 == 0: it sets r10 = 0 (filter
# mode 0) and skips the load by jumping to 0x821B2208, where the original
# compare/clear-bits logic resumes. r24 != 0 returns false -> original lhzx runs.
[[midasm_hook]]
address = 0x821B2204
name = "sciv_sub_821B1368_null_source_filter_guard"
registers = ["r24", "r10"]
jump_address_on_true = 0x821B2208

# --- Runtime crash fix: null container in sub_82124CD8 (see src/sciv_hooks.cpp) ---
# sub_82124CD8 (manager lookup, global 0x82CF0AF8) is designed to return 0 -- every
# caller null-checks it (e.g. sub_82227268 @ 0x82227708 `cmplwi r3,0; beq`). But it
# reads [r5+0] at 0x82124D14 with no null check, assuming sub_821F2A10 (-> r5) is
# populated. SkipLogos acceleration lets the engine-tick thread outrun container
# population: r5 == 0 -> read of guest 0 -> host 0x100000000 AV (logs 091+, only in
# accelerated boots; absent from 1x runs 045-067). Fire when r5 == 0 to take the
# function's own "not found" exit (0x82124D5C, `li r3,0; return`).
[[midasm_hook]]
address = 0x82124D14
name = "sciv_sub_82124CD8_null_container_guard"
registers = ["r5"]
jump_address_on_true = 0x82124D5C

# --- [Game] SkipLogos: scoped guest-clock acceleration (see src/sciv_hooks.cpp)
# The boot-intro fades+holds are paced by the guest time-base (mftb ->
# Clock::QueryGuestTickCount, which honours guest_time_scalar). These two hooks
# bracket modal_display_loop's body so the scalar is raised ONLY while the
# boot-intro modal (r31 == 0x82891D50) runs and restored to 1x the instant it
# completes -- never leaking into menus/gameplay.
#
# tick: top of the loop body (0x82430818, `lwz r4,80(r31)`). r31 = modal state.
[[midasm_hook]]
address = 0x82430818
name = "sciv_intro_clock_tick"
registers = ["r31"]

# done: loop completion/epilogue (0x8243089C, `li r3,0`), reached when the exit
# flag [s+0x44] != 0. r31 still holds the modal state (restored only at 0x824308B0).
[[midasm_hook]]
address = 0x8243089C
name = "sciv_intro_clock_done"
registers = ["r31"]

# asset-phase watcher: restores the guest clock to 1x when the intro cinematic
# (event\scene\ / event\segment\) starts loading, so logos run fast but the
# cinematic plays at normal speed. r3 = descriptor, filename ptr at [r3+0].
# (Env SCIV_LOG_ASSETS additionally logs every open.)
[[midasm_hook]]
address = 0x82420D90
name = "sciv_intro_asset_watch"
registers = ["r3"]
