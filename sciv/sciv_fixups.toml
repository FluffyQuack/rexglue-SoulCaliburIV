# SoulCalibur IV — hand-authored boundary fixups (Step 7, first codegen loop).
#
# Included from sciv_manifest.toml ([entrypoint].includes), kept SEPARATE from
# sciv_config.toml so the IDA boundary seed there can be regenerated by
# scripts/ida/export_named_funcs.py (overwrite mode) without clobbering these
# comments — the exporter drops comments interleaved between [functions] entries
# and re-sorts the section. Everything here is resolved structurally against
# Assets/SCIV/default.disasm.txt; no sizes are guessed. Every entry explains
# the exact terminator that fixes its boundary.
#
# The first seven (Step 7) were Validate-phase `UnresolvedCall` errors: a far
# tail `b <target>` whose target was never carved into a function, so the branch
# had nowhere to land. Later entries (Step 11) are runtime indirect-call traps
# ("Call to invalid or unregistered function at guest address 0x…"): complete
# functions reached only through a guest function pointer (vtable slot / interrupt
# or callback), which codegen never carved because no direct call/branch targets
# them. Each fix registers the target with the exact code extent ending at its
# terminating instruction (b / bctr / blr); the trailing `.long 0` alignment
# padding and any following unrelated function are deliberately excluded.

[functions]

# C++ adjustor thunks: `addi r3,r3,8` (shift `this` past a sub-object) then
# tail `b` to the real method. Exactly 2 instructions = 0x08. The exporter
# carved the neighbours at 0x82416FE0 and 0x82417000 but missed these three,
# which are only reached via tail-call (from 0x8241A0B0 / 0x8241A110 / 0x8241A170).
0x82416FE8 = { size = 0x08, name = "adjustor_thunk_82416FE8" }  # b 0x824192B8
0x82416FF0 = { size = 0x08, name = "adjustor_thunk_82416FF0" }  # b 0x82419440
0x82416FF8 = { size = 0x08, name = "adjustor_thunk_82416FF8" }  # b 0x82419610

# Null-checked forwarder: `lwz r3,12(r3); cmpwi; bne+; blr` (return if null)
# else `b 0x82415998` (tail-call). Five instructions, terminator is the `b` at
# 0x82414B30; 0x82414B34 is `.long 0` padding before the identical sibling at
# 0x82414B38. size = 0x82414B34 - 0x82414B20 = 0x14.
0x82414B20 = { size = 0x14, name = "fwd_nullchk_82414B20" }

# Virtual-call dispatcher: `lwz r3,180(r3); cmplwi; beqlr` (return if null) else
# load a global fn-pointer and `bctr` (tail-call). Terminator is the `bctr` at
# 0x82433040; the `blr` at 0x82433044 is a separate fragment (unreachable by
# fallthrough past an unconditional bctr). size = 0x82433044 - 0x82433028 = 0x1C.
0x82433028 = { size = 0x1C, name = "vcall_dispatch_82433028" }

# Accessor: `mr r11,r3; lwz r10,8(r11); addi r3,r10,1; stw r3,8(r11); blr`
# (pre-increment and return *(r3+8)). Terminator is the `blr` at 0x82586020;
# 0x82586024 is `.long 0` padding before the next function at 0x82586028.
# size = 0x82586024 - 0x82586010 = 0x14.
0x82586010 = { size = 0x14, name = "preinc_field8_82586010" }

# C++ adjustor thunk: `addi r3,r3,4` (shift `this` past a 4-byte sub-object)
# then tail `b 0x82586F30`. 0x08. Sibling at 0x82589908 (b 0x82586E38) was
# carved; this one is only reached via tail-call from 0x8258A274.
0x82589910 = { size = 0x08, name = "adjustor_thunk_82589910" }

# --- Step 11 boot bring-up: runtime indirect-call traps ---

# E_NOTIMPL stub: `lis r3,0x8000; ori r3,r3,0x4001; blr` -> returns 0x80004001
# (E_NOTIMPL). 3 instructions = 0x0C; terminator is the `blr` at 0x823AD290,
# followed by `.long 0` padding at 0x823AD294. Reached only via an indirect call
# during interrupt-callback setup (right after SetInterruptCallback(823DE780,…)
# at title GPU bring-up), so no direct branch carved it. First runtime
# "unregistered function" fatal.
0x823AD288 = { size = 0x0C, name = "ret_E_NOTIMPL_823AD288" }

# Getter `addi r3,r3,8; blr` (return this+8). 2 instructions = 0x08; terminator
# is the `blr` at 0x823A1BB4 (next function `lwz r3,4(r3); blr` at 0x823A1BB8).
# An indirect-call target the bulk vtable/callback scanners deliberately skip:
# the instruction at T-4 (0x823A1BAC) is `bl 0x8254A440` (a no-return call), not
# an unconditional terminator, so the conservative "starts right after a function
# end" guard rejects it. Hand-registered after the second boot trap.
0x823A1BB0 = { size = 0x08, name = "get_field8_823A1BB0" }

# Member-pointer adjustor thunks: `lwz r3,48(r3); b <method>` (replace `this`
# with its sub-object at +0x30, then tail-call the real method). 2 instructions
# = 0x08. They live in a packed table at 0x82415E00.. whose siblings (0x82415E28,
# 0x82415E38, 0x82415E40, 0x82415E48, ...) and 0x82415C10 WERE carved, but these
# two slots are referenced only by a vtable the bulk scanner didn't recover, so
# discovery skipped them. 0x82415E30 was the third boot trap (hit right after the
# type registry at 0x830F5198 reached 14/14 — unmasked by the dcbz cache-line
# fix); 0x82415C18 is the identical sibling in the same table, registered
# pre-emptively. Terminator is the `b` ending each thunk; the next thunk follows.
0x82415C18 = { size = 0x08, name = "adjustor_thunk_82415C18" }  # b 0x82416C18
0x82415E30 = { size = 0x08, name = "adjustor_thunk_82415E30" }  # b 0x82416BE8

# --- Reverse-engineered name (for readable crash backtraces) ---
# (r3 = object, r4 = optional *source* object). Per-frame update of an object's
# interpolated transform/colour state; when a source object is supplied it copies
# /reads fields from it (offsets +0x30, +0x19CC0, +0x1ED6A), all guarded by r24
# null checks -- except the one fixed by the midasm hook below. Name only; codegen
# keeps the auto-discovered boundary.
0x821B1368 = { name = "obj_update_optional_source" }

# --- Runtime crash fix: null-source filter read (see src/sciv_hooks.cpp) ---
# obj_update_optional_source (0x821B1368) is called at 0x822E0B34 with r4 = 0 (no
# source). On the r24 == 0 path, when the object's two control floats are equal,
# control reaches 0x821B2204 `lhzx r10,r24,r10` (r10 = 0x1ED6A, r24 = 0), reading
# guest 0x1ED6A -- benign on console, unmapped in the recomp -> intermittent AV
# (logs/sciv_033.log). The hook fires only when r24 == 0: it sets r10 = 0 (filter
# mode 0) and skips the load by jumping to 0x821B2208, where the original
# compare/clear-bits logic resumes. r24 != 0 returns false -> original lhzx runs.
[[midasm_hook]]
address = 0x821B2204
name = "sciv_sub_821B1368_null_source_filter_guard"
registers = ["r24", "r10"]
jump_address_on_true = 0x821B2208

# --- Reverse-engineered names: boot intro / logo sequence (for [Game] SkipLogos)
# RE'd 2026-06-21 from Assets/SCIV/default.disasm.txt + runtime probing. The boot
# intro (a "now loading" phase then the five logos BANDAI NAMCO / Havok / CRI /
# SoulCalibur / Project Soul) is ONE statically-allocated modal (state 0x82891D50)
# driven by the generic modal_display_loop on the boot thread. Each logo holds
# ~4 s; the hold is WALL-CLOCK paced (NOT loop-iteration and NOT vblank paced --
# both proven not to matter at runtime). No working skip mechanism yet; see
# SCIV_LOGO_SKIP_WIP.md. NB: bailing the loop's [state+0x44] exit early strands
# the game on a white screen -- do not do it.
0x824307F0 = { name = "modal_display_loop" }  # generic modal loop; drives the boot-intro modal (state 0x82891D50)
0x82420D90 = { name = "asset_loader" }        # GENERIC file/asset loader (opens [descriptor+0]); NOT logo-specific
# NOTE: the 0x82459xxx-0x8245Bxxx "logo_player"/manager module is a DIFFERENT,
# UNRELATED subsystem (its functions never run during the boot logos) -- do not
# assume it is the boot-logo path.

# --- [Game] SkipLogos: scoped guest-clock acceleration (see src/sciv_hooks.cpp)
# The boot-intro fades+holds are paced by the guest time-base (mftb ->
# Clock::QueryGuestTickCount, which honours guest_time_scalar). These two hooks
# bracket modal_display_loop's body so the scalar is raised ONLY while the
# boot-intro modal (r31 == 0x82891D50) runs and restored to 1x the instant it
# completes -- never leaking into menus/gameplay.
#
# tick: top of the loop body (0x82430818, `lwz r4,80(r31)`). r31 = modal state.
[[midasm_hook]]
address = 0x82430818
name = "sciv_intro_clock_tick"
registers = ["r31"]

# done: loop completion/epilogue (0x8243089C, `li r3,0`), reached when the exit
# flag [s+0x44] != 0. r31 still holds the modal state (restored only at 0x824308B0).
[[midasm_hook]]
address = 0x8243089C
name = "sciv_intro_clock_done"
registers = ["r31"]

# asset-phase watcher: restores the guest clock to 1x when the intro cinematic
# (event\scene\ / event\segment\) starts loading, so logos run fast but the
# cinematic plays at normal speed. r3 = descriptor, filename ptr at [r3+0].
# (Env SCIV_LOG_ASSETS additionally logs every open.)
[[midasm_hook]]
address = 0x82420D90
name = "sciv_intro_asset_watch"
registers = ["r3"]
